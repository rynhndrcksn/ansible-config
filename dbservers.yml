---

- hosts: dbservers
  become: true
  vars_files:
    - vault/secrets.yml
  roles:
    - { role: common, tags: ["common"] }
    - { role: create_admin_users, tags: ["admin_users", "users"] }
    - { role: setup_docker, tags: ["docker", "containerization"] }
    - { role: open_port_5432, tags: ["firewall", "web"] }

