---

- name: Render selected logrotate configs from templates
  ansible.builtin.template:
    src: "{{ item }}.j2"
    dest: "/etc/logrotate.d/{{ item }}"
    owner: root
    group: root
    mode: "0644"
  loop: "{{ logrotate_configs | default([]) }}"

- name: Ensure nginx logrotate user exists (if configured)
  ansible.builtin.user:
    name: "{{ nginx_logrotate_user }}"
    uid: "{{ nginx_logrotate_uid | default(omit) }}"
    system: true
    shell: /usr/sbin/nologin
  when:
    - "'nginx' in (logrotate_configs | default([]))"
    - nginx_logrotate_user is defined

