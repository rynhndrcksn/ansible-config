---

- name: Ensure Ansible group exists
  ansible.builtin.group:
    name: "{{ item.username }}"
    gid: "{{ item.gid }}"
    state: present
  loop: "{{ users }}"

- name: Manage Ansible user accounts
  ansible.builtin.user:
    name: "{{ item.username }}"
    password: "{{ item.password }}"
    uid: "{{ item.uid }}"
    group: "{{ item.username }}"
    groups: "sudo"
    append: true
    shell: /bin/bash
    create_home: true
    state: "{{ item.state | default('absent') }}"
  loop: "{{ users }}"

- name: Deploy authorized keys
  ansible.posix.authorized_key:
    user: "{{ item.username }}"
    key: "{{ item.ssh_key_files | join('\n') }}"
    state: "{{ item.state | default('absent') }}"
  loop: "{{ users }}"
  when: item.state | default('absent') == 'present'

- name: Configure sudoers for Ansible user
  ansible.builtin.copy:
    dest: "/etc/sudoers.d/{{ item.username }}"
    content: "{{ item.username }} ALL=(ALL) NOPASSWD:ALL\n"
    mode: '0440'
    validate: '/usr/sbin/visudo -cf %s'
  loop: "{{ users }}"

